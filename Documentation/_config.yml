---
title: Spectrum documentation
plugins:
  - jekyll-asciidoc
  - jekyll-redirect-from
exclude:
  - '*.license'
  - '*.nix'
  - /scripts
  - README
  - result*
asciidoctor:
  attributes:
    showtitle: '@'
    source-highlighter: rouge
